        :root {
            --y2k-pink: #ff00ff;
            --y2k-blue: #00f0ff;
            --y2k-green: #00ff41;
            --y2k-black: #050505;
            --y2k-bg: #1a1a2e;
        }

        body {
            font-family: 'VT323', monospace;
            background: var(--y2k-bg);
            /* Hiệu ứng màn hình CRT cũ */
            background-image:

                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            color: #fff;
            margin: 0; padding: 10px;
            overflow-x: hidden;
        }

        /* Container chính kiểu Window 98/Y2K */
        .card {
            background: #c0c0c0;
            border: 3px solid;
            border-color: #fff #808080 #808080 #fff;
            padding: 4px;
            max-width: 500px;
            width: 100%;
            margin: 20px auto;
            box-shadow: 8px 8px 0px var(--y2k-pink);
        }

        .window-header {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
        }

        h2 { text-align: center; color: var(--y2k-black); text-shadow: 2px 2px var(--y2k-blue); margin: 15px 0; font-size: 2.5rem; }

        /* Film Strip - Cải tiến rực rỡ hơn */
        .film-strip { 
            background: #000; 
            padding: 40px 15px; 
            display: flex; flex-direction: column; gap: 40px; 
            border: 4px double var(--y2k-blue);
            position: relative;
        }
        
        .polaroid { 
            background: #fff; padding: 10px 10px 40px 10px; 
            box-shadow: 5px 5px 0px var(--y2k-green);
            position: relative; transition: 0.3s;
        }
        .polaroid img { width: 100%; border: 2px solid #000; filter: contrast(110%) saturate(120%); }

        /* Hệ thống Sticker (Kéo thả) */
        .sticker {
            position: absolute; width: 80px; cursor: move; z-index: 100;
            touch-action: none; pointer-events: auto;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.5));
        }
        .sticker-active { outline: 3px dashed var(--y2k-pink); transform: scale(1.1); }

        /* Kho Sticker (Drawer) */
        .sticker-drawer {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #c0c0c0; border-top: 4px solid #fff;
            z-index: 1000; padding: 15px;
            height: 250px; overflow-y: auto;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }
        .sticker-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
        }
        .sticker-item { width: 100%; cursor: pointer; border: 1px solid #808080; padding: 5px; background: #eee; }

        /* Nút bấm & Bảng điều khiển */
        .controls-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;
        }

            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 8px;
